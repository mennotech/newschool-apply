services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backend-customized
    ports:
      - "8080:80"
    environment:
      DRUPAL_ADMIN_USER: ${DRUPAL_ADMIN_USER:-admin}
      DRUPAL_ADMIN_PASS: ${DRUPAL_ADMIN_PASS:?Set DRUPAL_ADMIN_PASS in .env before starting the backend}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      DRUPAL_SITE_NAME: ${DRUPAL_SITE_NAME:-NewSchool Apply}
      DRUPAL_SQLITE_PATH: /var/drupal-db/db.sqlite
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - backend_drupal_files:/var/www/html/web/sites/default/files
      - backend_drupal_db:/var/drupal-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/user/login_status?_format=json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_BASE_URL: ${BACKEND_URL:-http://localhost:8080}
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  backend_drupal_files:
  backend_drupal_db:
