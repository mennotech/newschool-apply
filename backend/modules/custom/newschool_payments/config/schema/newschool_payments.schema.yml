newschool_payments.settings:
  type: config_object
  label: 'NewSchool payments settings'
  mapping:
    stripe_secret_key:
      type: string
      label: 'Stripe secret key'
    stripe_webhook_secret:
      type: string
      label: 'Stripe webhook secret'
    success_url:
      type: string
      label: 'Success URL'
    cancel_url:
      type: string
      label: 'Cancel URL'
    fees:
      type: mapping
      label: 'Fee mapping'
      mapping:
        '*':
          type: mapping
          label: 'Fee for bundle'
          mapping:
            amount_cents:
              type: integer
              label: 'Amount in cents'
            currency:
              type: string
              label: 'Currency'
            label:
              type: string
              label: 'Label'
