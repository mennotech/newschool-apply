version: 2
catalog:
  reusable_bundles:
    - machine_name: application
      label: Application
      description: Reusable application metadata and cross-form relationships shared by all application types.
      kind: reusable_application
      sections:
        - id: application_identity
          title: Application Identity
          description: Shared workflow and ownership metadata for all application records.
          fields:
            - key: application_status
              label: Application Status
              type: select
              required: true
              options: [draft, submitted, under_review, accepted, not_accepted]
            - key: submitted_at
              label: Submitted At
              type: date
              required: false
            - key: student
              label: Student Profile
              type: student_reference
              required: true
            - key: student_applying_for_grade
              label: Applying For Grade
              type: select
              required: true
            - key: primary_guardian_person
              label: Primary Guardian
              type: person_reference
              required: true
            - key: secondary_guardian_person
              label: Secondary Guardian
              type: person_reference
              required: false
            - key: household_relationship_status
              label: Student's Parents Are
              type: radio
              required: true
              options: [married, divorced, separated, other]
            - key: student_lives_with
              label: Student Lives With
              type: radio
              required: true
              options: [both_parents, mother, father, shared_custody, other]
            - key: custody_description
              label: Custody Description
              type: radio
              required: true
              options: [joint, mother, father, other]
        - id: application_review
          title: Application Review Tracking
          description: Reusable review-state markers for all application forms.
          fields:
            - key: section_1_reviewed
              label: Section 1 Reviewed
              type: radio
              required: false
              options: [yes, no]
            - key: section_2_reviewed
              label: Section 2 Reviewed
              type: radio
              required: false
              options: [yes, no]
            - key: section_3_reviewed
              label: Section 3 Reviewed
              type: radio
              required: false
              options: [yes, no]
            - key: section_4_reviewed
              label: Section 4 Reviewed
              type: radio
              required: false
              options: [yes, no]
            - key: section_5_reviewed
              label: Section 5 Reviewed
              type: radio
              required: false
              options: [yes, no]
            - key: section_6_reviewed
              label: Section 6 Reviewed
              type: radio
              required: false
              options: [yes, no]
